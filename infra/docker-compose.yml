version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: radarinvest-db
    environment:
      POSTGRES_DB: radarinvest
      POSTGRES_USER: radarinvest
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
